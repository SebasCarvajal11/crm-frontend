server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # HSTS cuando el cliente llega por HTTPS (p. ej. TLS en load balancer)
    set $hsts_header "";
    if ($http_x_forwarded_proto = "https") {
        set $hsts_header "max-age=31536000; includeSubDomains";
    }
    add_header Strict-Transport-Security $hsts_header always;

    # Frontend SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Misma semántica que vite.config.ts (dev): /api/* -> KrakenD sin prefijo /api
    location ^~ /api {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;

        # INT-012: refuerzo en respuestas API (KrakenD también aplica security/http)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection "1; mode=block" always;
        set $api_hsts "";
        if ($http_x_forwarded_proto = "https") {
            set $api_hsts "max-age=31536000; includeSubDomains";
        }
        add_header Strict-Transport-Security $api_hsts always;
    }
}
