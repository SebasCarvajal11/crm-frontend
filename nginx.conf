server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include snippets/security-headers.conf;

    # HSTS cuando el cliente llega por HTTPS (p. ej. TLS en load balancer)
    set $hsts_header "";
    if ($http_x_forwarded_proto = "https") {
        set $hsts_header "max-age=31536000; includeSubDomains";
    }
    add_header Strict-Transport-Security $hsts_header always;

    # Frontend SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Misma semántica que vite.config.ts (dev): /api/* -> KrakenD sin prefijo /api
    location ^~ /api {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;

        # INT-012: refuerzo en respuestas API (KrakenD tambien aplica security/http)
        include snippets/security-headers.conf;
        set $api_hsts "";
        if ($http_x_forwarded_proto = "https") {
            set $api_hsts "max-age=31536000; includeSubDomains";
        }
        add_header Strict-Transport-Security $api_hsts always;
    }
}
