add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
# blob: en connect-src y worker-src: requerido para Web Workers cargados como módulos
# (Vite sirve los workers como blob: URLs en dev/preview; el worker de recorte de imágenes
# también usa createImageBitmap sobre blobs en el hilo del worker).
# blob: en script-src: necesario para que el navegador ejecute el script del worker inline.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' blob: https:; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
add_header X-XSS-Protection "1; mode=block" always;
